# ============================================================
#  中央大脑 (Central Brain) 配置示例
#  文件格式：YAML 或 JSON
#  使用方式：
#    export CENTRAL_CONFIG=/path/to/central-config.yaml
#    brain-central
#  环境变量 LLM_API_KEY/LLM_BASE_URL/LLM_MODEL 优先级高于配置文件
# ============================================================

# ==================== LLM 配置 ====================
# 用于交易复审和日终分析的大语言模型
llm:
  api_key: ""                          # API 密钥（也可通过 LLM_API_KEY 环境变量设置）
  base_url: "https://api.deepseek.com/v1"  # API 地址
  model: "deepseek-chat"               # 模型名称
  max_tokens: 500                      # 最大输出 token 数
  temperature: 0.3                     # 温度（0~1，越低越保守，推荐 0.3）
  timeout: "15s"                       # HTTP 请求超时

  # 支持的 LLM 服务：
  #
  # DeepSeek V3.2（默认，推荐，性价比最高）:
  #   base_url: "https://api.deepseek.com/v1"
  #   model: "deepseek-chat"
  #
  # Claude（Anthropic）:
  #   base_url: "https://api.anthropic.com/v1"
  #   model: "claude-sonnet-4-20250514"
  #
  # HunYuan（腾讯混元）:
  #   base_url: "https://api.hunyuan.cloud.tencent.com/v1"
  #   model: "hunyuan-pro"
  #
  # 任何 OpenAI 兼容 API:
  #   base_url: "https://your-api.example.com/v1"
  #   model: "your-model-name"

# ==================== 交易复审配置 ====================
# LLM 复审触发条件（满足任一即触发）
review:
  enabled: true                        # 是否启用 LLM 复审
  trigger_concurrent: 3                # 持仓数 >= N 时触发复审
  trigger_position_pct: 5              # 最大单仓占比 > N% 时触发
  trigger_daily_loss: 3                # 当日亏损 > N% 时触发
  timeout: "10s"                       # LLM 复审响应超时（超时则自动放行）
  max_tokens: 500                      # 复审 LLM 输出 token 上限

# ==================== 提供的工具 ====================
# 中央大脑注册以下工具供 Kernel 调用：
#
# central.plan_create    — 创建计划
# central.plan_update    — 更新计划
# central.delegate       — 委派子任务给专家大脑
# central.review_trade   — LLM 交易复审（量化大脑触发）
# central.daily_review   — 日终分析报告
# central.data_alert     — 数据质量告警处理
# central.echo           — 回声测试
# central.reject_task    — 拒绝任务

# ==================== 启动命令 ====================
#
# 最小启动（不启用 LLM，复审请求将自动放行）:
#   brain-central
#
# 使用配置文件:
#   CENTRAL_CONFIG=./central-config.yaml brain-central
#
# 环境变量覆盖（优先级最高）:
#   LLM_API_KEY="sk-xxx" CENTRAL_CONFIG=./central-config.yaml brain-central
