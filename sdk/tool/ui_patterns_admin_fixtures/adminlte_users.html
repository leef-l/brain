<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Users | AdminLTE Demo</title>
</head>
<body class="hold-transition sidebar-mini">
  <div class="wrapper">
    <section class="content">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Users</h3>
          <div class="card-tools">
            <button type="button" class="btn btn-default filter-btn" aria-label="Filter">Filter</button>
            <button type="button" class="btn btn-success export-btn" aria-label="Export CSV">Export CSV</button>
            <button type="button" class="btn btn-danger batch-btn" data-action="batch-delete">Batch Delete</button>
          </div>
        </div>
        <div class="card-body">
          <form class="filter-form" method="get">
            <select name="status" class="form-control">
              <option value="">-- Status --</option>
              <option value="active">Active</option>
              <option value="banned">Banned</option>
            </select>
            <input type="date" name="from" placeholder="From">
            <input type="date" name="to" placeholder="To">
            <button type="submit" class="btn btn-primary">Apply</button>
          </form>
          <table class="table table-bordered table-hover">
            <thead>
              <tr>
                <th><input type="checkbox" aria-label="select all"></th>
                <th>ID</th><th>Name</th><th>Email</th><th>Status</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><input type="checkbox"></td>
                <td>1</td><td>Alice</td><td>a@ex.com</td><td>active</td>
                <td>
                  <button class="btn btn-sm btn-primary edit-btn">Edit</button>
                  <button class="btn btn-sm btn-danger delete-btn">Delete</button>
                </td>
              </tr>
              <tr>
                <td><input type="checkbox"></td>
                <td>2</td><td>Bob</td><td>b@ex.com</td><td>banned</td>
                <td>
                  <button class="btn btn-sm btn-primary edit-btn">Edit</button>
                  <button class="btn btn-sm btn-danger delete-btn">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
          <nav aria-label="pagination">
            <ul class="pagination">
              <li class="page-item active"><a class="page-link" href="?page=1">1</a></li>
              <li class="page-item"><a class="page-link" href="?page=2">2</a></li>
              <li class="page-item"><a class="page-link" href="?page=3">3</a></li>
              <li class="page-item next"><a class="page-link" rel="next" href="?page=2">Next</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </section>
  </div>
  <!-- Delete confirm modal (bootstrap-style) -->
  <div class="modal" role="dialog" aria-label="confirm-delete">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5>Confirm Delete</h5></div>
        <div class="modal-body">Are you sure you want to delete this record?</div>
        <div class="modal-footer">
          <button class="btn btn-secondary">Cancel</button>
          <button class="btn btn-danger">Delete</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
