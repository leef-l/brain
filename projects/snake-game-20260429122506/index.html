<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">🐍 Snake Game</h1>

        <div class="score-board">
            <div class="score">
                <span class="score-label">Score:</span>
                <span id="scoreDisplay" class="score-value">0</span>
            </div>
            <div class="high-score">
                <span class="score-label">High Score:</span>
                <span id="highScoreDisplay" class="score-value">0</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="gameOverlay" class="game-overlay hidden">
                <div class="overlay-content">
                    <h2 id="overlayTitle">Game Over!</h2>
                    <p id="overlayScore">Score: 0</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn btn-start">Start Game</button>
            <button id="resetBtn" class="btn btn-reset">Reset</button>
        </div>

        <div class="instructions">
            <p>Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> arrow keys to control the snake</p>
            <p>Press <kbd>Space</kbd> to pause/resume</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
