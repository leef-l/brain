# ============================================================
#  浏览器大脑 (Browser Brain) 配置示例
#
#  Browser Brain 是 sidecar 架构，由 Kernel 通过 stdio JSON-RPC 启动，
#  不接受命令行参数。配置通过以下方式传入：
#    1. 环境变量
#    2. ~/.brain/config.json 中的 tool_profiles / active_tools
#    3. RPC ExecuteRequest 中的 budget / execution 字段
# ============================================================

# --- 环境变量 ---
# BROWSER_PATH           指定浏览器可执行文件路径（默认自动检测）
# BRAIN_CONFIG           覆盖默认配置文件路径（默认 ~/.brain/config.json）
# BRAIN_LICENSE_REQUIRED 设为 "1" 强制要求 license 校验

# --- 浏览器自动检测顺序（Linux）---
# 1. google-chrome-stable / google-chrome
# 2. /usr/bin/google-chrome
# 3. /opt/google/chrome/google-chrome
# 4. chromium-browser / chromium
# 5. microsoft-edge-stable
# 6. brave-browser-stable
#
# 指定自定义路径：
# export BROWSER_PATH="/opt/google/chrome/google-chrome"

# --- 浏览器启动参数（内置，不可修改）---
# --headless=new               无头模式
# --window-size=1920,1080      视口分辨率
# --no-sandbox                 禁用沙箱
# --disable-gpu                禁用 GPU
# --remote-debugging-port=自动  CDP 端口（9222-9321 自动分配）

# --- 工具策略（写入 ~/.brain/config.json）---
# Browser Brain 注册的工具（15 个）：
#   browser.open          — 打开 URL
#   browser.navigate      — 导航（前进/后退/刷新）
#   browser.click         — 单击元素
#   browser.double_click  — 双击元素
#   browser.right_click   — 右键点击
#   browser.type          — 输入文本
#   browser.press_key     — 按键/组合键
#   browser.scroll        — 滚动页面
#   browser.hover         — 悬停
#   browser.drag          — 拖拽
#   browser.select        — 下拉选择
#   browser.upload_file   — 文件上传
#   browser.screenshot    — 截图
#   browser.eval          — 执行 JavaScript
#   browser.wait          — 等待元素/条件
#
# 示例：禁止 JavaScript 执行
# {
#   "tool_profiles": {
#     "no_eval": {
#       "include": ["browser.*"],
#       "exclude": ["browser.eval"]
#     }
#   },
#   "active_tools": {
#     "delegate.browser": "no_eval"
#   }
# }

# --- 执行预算（通过 RPC ExecuteRequest 传入）---
# budget:
#   max_turns: 15              # Agent Loop 最大轮次（默认 15）

# --- 文件策略（通过 RPC ExecuteRequest 传入）---
# execution:
#   workdir: /path/to/project
#   file_policy:
#     allow_read:
#       - "**/*.html"
#       - "**/*.png"
#     allow_create:
#       - "screenshots/**"
#     allow_edit: []
#     allow_delete: []
#     deny:
#       - ".git/**"
#       - "**/.env"

# --- 完整 config.json 示例 ---
# {
#   "tool_profiles": {
#     "browser_safe": {
#       "include": ["browser.*"],
#       "exclude": ["browser.eval"]
#     }
#   },
#   "active_tools": {
#     "delegate.browser": "browser_safe"
#   }
# }
