# ============================================================
#  验证大脑 (Verifier Brain) 配置示例
#
#  Verifier Brain 是只读验证专用 sidecar，独立审核其他大脑的工作成果。
#  由 Kernel 通过 stdio JSON-RPC 启动，不接受命令行参数。
#  配置通过以下方式传入：
#    1. 环境变量
#    2. ~/.brain/config.json 中的 tool_profiles / active_tools
#    3. RPC ExecuteRequest 中的 budget / execution 字段
# ============================================================

# --- 环境变量 ---
# BRAIN_CONFIG           覆盖默认配置文件路径（默认 ~/.brain/config.json）
# BRAIN_LICENSE_REQUIRED 设为 "1" 强制要求 license 校验

# --- 工具策略（写入 ~/.brain/config.json）---
# Verifier Brain 注册的工具（4 个）：
#   verifier.read_file       — 读取文件内容（只读）
#   verifier.run_tests       — 运行测试套件
#   verifier.check_output    — 校验命令输出
#   verifier.browser_action  — 请求浏览器操作（委派给 Browser Brain）
#
# 示例：仅允许本地验证（禁止浏览器操作）
# {
#   "tool_profiles": {
#     "verifier_local": {
#       "include": ["verifier.read_file", "verifier.run_tests", "verifier.check_output"],
#       "exclude": ["verifier.browser_action"]
#     }
#   },
#   "active_tools": {
#     "delegate.verifier": "verifier_local"
#   }
# }

# --- 执行预算（通过 RPC ExecuteRequest 传入）---
# budget:
#   max_turns: 8               # Agent Loop 最大轮次（默认 8）

# --- 文件策略（通过 RPC ExecuteRequest 传入）---
# Verifier 是只读大脑，建议配置为仅读取：
# execution:
#   workdir: /path/to/project
#   file_policy:
#     allow_read:              # 允许读取所有源码
#       - "**/*.go"
#       - "**/*.ts"
#       - "**/*.py"
#       - "**/*.md"
#     allow_create: []         # 不允许创建文件
#     allow_edit: []           # 不允许编辑文件
#     allow_delete: []         # 不允许删除文件
#     deny:
#       - ".git/**"
#       - "**/.env"
#       - "**/secrets/**"
#     allow_commands: true     # 允许执行命令（用于 run_tests）
#     allow_delegate: true     # 允许委派（用于 browser_action）

# --- 验证结果格式 ---
# Verifier 的输出必须以判定结论结尾：
#   VERDICT: PASS — 所有测试通过，代码符合预期
#   VERDICT: FAIL — 发现 3 处未处理错误，2 个测试失败

# --- 完整 config.json 示例 ---
# {
#   "tool_profiles": {
#     "verifier_readonly": {
#       "include": ["verifier.*"],
#       "exclude": []
#     }
#   },
#   "active_tools": {
#     "delegate.verifier": "verifier_readonly"
#   }
# }
